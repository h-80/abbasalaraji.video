<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرادود عباس الأعرجي</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');

*{box-sizing:border-box}
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  font-family:'Cairo',sans-serif;
  background:#000;
}

#playerPage{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  width:100%;
  height:100vh;
  background:#000;
  display:block;
  z-index:9999;
  overflow-y:scroll;
  overflow-x:hidden;
  scroll-snap-type:y mandatory;
}

.video-container{
  width:100%;
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  background:#000;
}

.video-container iframe{
  width:100%;
  height:100%;
  border:none;
  position:relative;
  z-index:1;
}

.video-container .poster{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:2;
  display:none;
}
</style>
</head>

<body>

<div id="playerPage"></div>

<script>
const channelsData = `
https://www.youtube.com/shorts/hcjoqVCqKbc
https://www.youtube.com/shorts/UfTCtmOZd7o
https://www.youtube.com/shorts/qSeEjuamYdY

`;

function getYouTubeId(url){
  let regex = /youtube\.com\/shorts\/([^?&/]+)/;
  let match = url.match(regex);
  if(match) return match[1];
  
  regex = /(?:youtube\.com\/(?:.*v=|live\/)|youtu\.be\/)([^&?/]+)/;
  match = url.match(regex);
  return match ? match[1] : null;
}

const lines = channelsData.trim().split('\n').filter(l => l.trim() !== "");
const videoUrls = [];
for (let i = 0; i < lines.length; i++) {
  const url = lines[i].trim();
  if (url.startsWith('http')) {
    videoUrls.push(url);
  }
}

const playerPage = document.getElementById("playerPage");
let videoIds = [];
let currentPlayingIndex = -1;
let scrollTimeout = null;

videoUrls.forEach((url) => {
  const ytId = getYouTubeId(url);
  if (ytId) {
    videoIds.push(ytId);
  }
});

videoIds.forEach((ytId, index) => {
  const container = document.createElement('div');
  container.className = 'video-container';
  container.dataset.index = index;
  
  const poster = document.createElement('img');
  poster.className = 'poster';
  poster.src = `https://i.ytimg.com/vi/${ytId}/hqdefault.jpg`;
  poster.style.display = 'block';
  
  const iframe = document.createElement('iframe');
  iframe.dataset.index = index;
  iframe.src = `https://www.youtube.com/embed/${ytId}?autoplay=0&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1&mute=1`;
  iframe.allow = "autoplay; encrypted-media";
  iframe.allowFullscreen = true;
  
  iframe.onload = () => {
    poster.style.display = 'none';
  };
  
  container.appendChild(poster);
  container.appendChild(iframe);
  playerPage.appendChild(container);
});

function playVideo(index) {
  if (currentPlayingIndex === index) return;
  if (index < 0 || index >= videoIds.length) return;
  
  if (currentPlayingIndex >= 0 && currentPlayingIndex < videoIds.length) {
    const prevContainer = playerPage.querySelector(`.video-container[data-index="${currentPlayingIndex}"]`);
    if (prevContainer) {
      const prevIframe = prevContainer.querySelector('iframe');
      if (prevIframe) {
        prevIframe.src = `https://www.youtube.com/embed/${videoIds[currentPlayingIndex]}?autoplay=0&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1&mute=1`;
      }
    }
  }
  
  const container = playerPage.querySelector(`.video-container[data-index="${index}"]`);
  if (container) {
    const iframe = container.querySelector('iframe');
    if (iframe) {
      iframe.src = `https://www.youtube.com/embed/${videoIds[index]}?autoplay=1&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1&mute=0`;
      currentPlayingIndex = index;
    }
  }
}

function handleScroll() {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => {
    const containers = playerPage.querySelectorAll('.video-container');
    let visibleIndex = -1;
    let maxVisibility = 0;
    
    containers.forEach((container, index) => {
      const rect = container.getBoundingClientRect();
      const viewportHeight = window.innerHeight;
      const visibleTop = Math.max(rect.top, 0);
      const visibleBottom = Math.min(rect.bottom, viewportHeight);
      const visibleHeight = Math.max(0, visibleBottom - visibleTop);
      const visibleRatio = visibleHeight / viewportHeight;
      
      if (visibleRatio > maxVisibility) {
        maxVisibility = visibleRatio;
        visibleIndex = index;
      }
    });
    
    if (visibleIndex >= 0 && visibleIndex !== currentPlayingIndex) {
      playVideo(visibleIndex);
    }
  }, 150);
}

window.addEventListener('load', function() {
  setTimeout(() => {
    if (videoIds.length > 0) {
      playVideo(0);
    }
  }, 500);
  
  playerPage.addEventListener('scroll', handleScroll);
});
</script>

</body>
</html>
